kind = "web"
previewPath = "/"
title = "MS Arch"
version = "1.0.0"
id = "artifacts/ms-arch"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21230

[services.development]
run = "pnpm --filter @workspace/ms-arch run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ms-arch", "run", "build" ]
publicDir = "artifacts/ms-arch/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21230"
BASE_PATH = "/"
